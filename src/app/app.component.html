<div class="flexColumnAlignStartStretch">
    <!--  Header  -->
    <div class="flexRowAlignCenterCenter">
        <a href="https://www.fernuni-hagen.de/ilovepetrinets/"
            ><h1>I <span class="red">❤</span> Petri Nets</h1></a
        >
    </div>
    <h2>
        <i>Fachpraktikum Programmiersysteme WiSe25/26</i> by<br />
        ..., ..., ..., ... and ...
    </h2>

    <!--    Main content    -->
    <div>
        <app-main-tab (clearAll)="onClearAll()"></app-main-tab>
    </div>

    <div class="flexRowAlignSpaceEvenlyStart">
        <div class="buttonWrapperWidth flexColumnAlignStartCenter">
            <app-example-button title="Button" (buttonPressed)="processButtonClick()"></app-example-button>

            @if (buttonClickCount() > 0) {
                Number of tacos: {{ buttonClickCount() }}!
            }
        </div>

        <app-example-file
            title="File"
            link="assets/example.json"
            description="An example .json Petri net"></app-example-file>

        <mat-form-field appearance="outline">
            <mat-label>File content</mat-label>
            <textarea
                matInput
                cdkTextareaAutosize
                cdkAutosizeMinRows="10"
                cdkAutosizeMaxRows="20"
                [formControl]="textareaFc"></textarea>
        </mat-form-field>
    </div>

    <!--  Footer  -->
    <hr />
    <app-footer></app-footer>
</div>
