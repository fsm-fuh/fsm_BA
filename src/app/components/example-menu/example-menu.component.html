<button
    mat-icon-button
    color="primary"
    [matMenuTriggerFor]="mainMenu"
    [matTooltip]="'EXAMPLE_MENU.TOOLTIP' | translate"
    aria-label="Open example files"
    class="blue-icon-button">
    <mat-icon>file_open</mat-icon>
</button>

<mat-menu #mainMenu="matMenu">
    <button mat-menu-item (click)="loadExample('example.json')">
        <mat-icon matMenuItemIcon>description</mat-icon>
        {{ 'EXAMPLE_MENU.EXAMPLE_NET' | translate }}
    </button>
        <button
        mat-menu-item
        [matMenuTriggerFor]="menuCOV"
        (mouseenter)="setActiveMenu('COV')"
        (mouseleave)="setActiveMenu(null)">
        <mat-icon matMenuItemIcon>{{ getFolderIcon('COV') }}</mat-icon>
        {{ 'EXAMPLE_MENU.COV' | translate }}
    </button>
    <button
        mat-menu-item
        [matMenuTriggerFor]="menuMK"
        (mouseenter)="setActiveMenu('MK')"
        (mouseleave)="setActiveMenu(null)">
        <mat-icon matMenuItemIcon>{{ getFolderIcon('MK') }}</mat-icon>
        {{ 'EXAMPLE_MENU.MK' | translate }}
    </button>
    <button
        mat-menu-item
        [matMenuTriggerFor]="menuSS24"
        (mouseenter)="setActiveMenu('SS24')"
        (mouseleave)="setActiveMenu(null)">
        <mat-icon matMenuItemIcon>{{ getFolderIcon('SS24') }}</mat-icon>
        {{ 'EXAMPLE_MENU.SS24' | translate }}
    </button>
    <button

        (mouseleave)="setActiveMenu(null)">
        <mat-icon matMenuItemIcon>{{ getFolderIcon('WS24') }}</mat-icon>

    <button

        (mouseleave)="setActiveMenu(null)">
        <mat-icon matMenuItemIcon>{{ getFolderIcon('SS25') }}</mat-icon>
        {{ 'EXAMPLE_MENU.SS25' | translate }}
    </button>
</mat-menu>
