<svg
    #drawingArea
    class="canvas"
    viewBox="200 -50 900 450"
    preserveAspectRatio="xMidYMid meet"
    [class.disabled]="!isDrawingEnabled()"
    (drop)="processDropEvent($event)"
    (dragover)="prevent($event)">
    @for (arc of diagram()?.arcs; track arc.id) {
        <g appSvgArc [diagramArc]="arc" [nodes]="diagram()?.allNodes || []" />
    }

    @for (node of diagram()?.allNodes; track node.id) {
        <g appSvgNode [diagramNode]="node" />
    }
</svg>
