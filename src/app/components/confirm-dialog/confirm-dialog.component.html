<h2 mat-dialog-title>{{ data.title | translate }}</h2>
<mat-dialog-content>
    <p>{{ data.message | translate }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button color="warn" (click)="discard()">{{ 'CONFIRM_DIALOG.DISCARD' | translate }}</button>
    <button mat-flat-button color="primary" (click)="keep()">{{ 'CONFIRM_DIALOG.KEEP' | translate }}</button>
</mat-dialog-actions>
