<div class="tuple-input-container">
    <h2>{{ 'TUPLE_INPUT.HEADER' | translate }}</h2>
    <p>{{ 'TUPLE_INPUT.DESCRIPTION' | translate }}</p>
    <p class="format">{{ 'TUPLE_INPUT.FORMAT' | translate }}</p>

    <mat-form-field appearance="fill" class="full-width">
        <mat-label>{{ 'TUPLE_INPUT.LABEL' | translate }}</mat-label>
        <textarea
            matInput
            [(ngModel)]="tupleString"
            rows="5"
            placeholder="({p1, p2}, {t1}, (p1, t1) + (t1, p2), p1)"></textarea>
    </mat-form-field>

    <div class="actions">
        <button mat-button (click)="cancel()">{{ 'CANCEL' | translate }}</button>
        <button mat-raised-button color="primary" (click)="processTuple()" [disabled]="!tupleString">
            {{ 'TUPLE_INPUT.GENERATE' | translate }}
        </button>
    </div>
</div>
