<!-- Inherited from ProcessNetDraw -->

<div class="drawing-area-container">
    <svg class="drawing-canvas" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
        <!--[class.drag-over]="isDragOver()"
        (drop)="onDrop($event)"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (contextmenu)="preventContext($event)"> -->
        <defs>
            <marker id="arrowhead-draw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="black" />
            </marker>
        </defs>
        <!-- Grid background for better visual reference -->
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="lightgray" stroke-width="0.5" />
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />

      @for (node of reachabilityGraphdiagram()?.getNodes(); track node.id) {
        <g appSvgNode [diagramNode]="node" />
      }


    </svg>
    <div class="toolbar">
        <h3>Drawing Area</h3>
        <!-- <button class="clear-btn" (click)="clearDrawing()">Clear Drawing</button>
         -->
    </div>
    <div class="instructions">
        <p>REACHABILITY GRAPH</p>
        <p>Learn Mode</p>
        <p>Test Mode</p>
    </div>
</div>
