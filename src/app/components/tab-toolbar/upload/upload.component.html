<button
    mat-icon-button
    aria-label="Modus umschalten"
    color="primary"
    matTooltip="Netz hochladen"
    (click)="fileInput.click()">
    <mat-icon>upload_file</mat-icon>
</button>

<input #fileInput type="file" (change)="onFileSelected($event)" accept=".json, .xml, .pnml" style="display: none" />
