<button mat-icon-button [matTooltip]="'SAVE_AS' | translate" [matMenuTriggerFor]="saveMenu" color="primary">
    <mat-icon>save_alt</mat-icon>
</button>
<mat-menu #saveMenu="matMenu">
    <button mat-menu-item (click)="onSave('json')">
        <mat-icon class="icon-json">data_object</mat-icon>
        <span>{{ 'SAVE_AS_JSON' | translate }}</span>
    </button>
    <button mat-menu-item (click)="onSave('pnml')">
        <mat-icon class="icon-pnml">account_tree</mat-icon> <span>{{ 'SAVE_AS_PNML' | translate }}</span>
        <mat-icon class="icon-pnml">account_tree</mat-icon>
        <span>Save as <strong>PNML</strong></span>
    </button>
    <button mat-menu-item (click)="onImageSave('png')">
        <mat-icon class="icon-png">image</mat-icon>
        <span>Save as <strong>Image (PNG)</strong></span>
    </button>
    <button mat-menu-item (click)="onImageSave('jpeg')">
        <mat-icon class="icon-jpeg">broken_image</mat-icon>
        <span>Save as <strong>Image (JPEG)</strong></span>
    </button>
</mat-menu>
