<table>
    <thead>
        <tr>
            <th>Firing Sequence</th>
            <th>Transition Count</th>
            <th>Start Marking</th>
            <th>End Marking</th>
        </tr>
    </thead>
    <tbody>
        @for (entry of firingEntries(); track entry.id) {
            <tr>
                <td>{{ entry.firingSequence }}</td>
                <td>{{ entry.transitionCount }}</td>
                <td>{{ formatMarking(entry.startMarking) }}</td>
                <td>{{ formatMarking(entry.endMarking) }}</td>
            </tr>
        }
    </tbody>
</table>
