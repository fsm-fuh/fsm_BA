<!-- Inherited from ProcessNetDraw -->

<div class="drawing-area-container">
    <svg
        #drawingArea
        class="drawing-canvas"
        data-export-id="coverability-graph-draw"
        [attr.viewBox]="viewBox()"
        preserveAspectRatio="xMidYMid meet"
        (mousedown)="($event.target === drawingArea || $event.target === gridRect) && startPan($event)"
        (mousemove)="pan($event)"
        (mouseup)="endPan()"
        (mouseleave)="endPan()"
        (wheel)="onWheel($event)">
        <!-- Grid background for better visual reference -->
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="lightgray" stroke-width="0.5" />
        </pattern>
        <rect
            #gridRect
            [attr.x]="viewBoxObj().minX - viewBoxObj().width"
            [attr.y]="viewBoxObj().minY - viewBoxObj().height"
            [attr.width]="viewBoxObj().width * 3"
            [attr.height]="viewBoxObj().height * 3"
            fill="url(#grid)" />

        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="black" />
            </marker>
        </defs>
        @for (edge of displayDiagram().getEdges(); track edge.id) {
            <g
                appSvgStateArc
                [diagramArc]="edge"
                [nodes]="displayDiagram().getNodes() || []"
                [edges]="displayDiagram().getEdges() || []"
                [viewMode]="viewMode()" />
        }

        @for (node of displayDiagram().nodes; track node.id) {
            <g class="node-wrapper" [attr.data-node-id]="node.id">
                <g appSvgStateNode [stateNode]="node" [viewMode]="viewMode()" />
                <rect
                    class="drag-overlay"
                    [attr.x]="computePosition(node)"
                    [attr.y]="node.y - 20"
                    [attr.width]="calculateWidth(node)"
                    height="40"
                    fill="none"
                    stroke="none"
                    pointer-events="all"
                    style="cursor: move"
                    (mousedown)="onNodeMouseDown($event, node)"
                    (dblclick)="coverabilityGraphStateNodeClicked(node)" />
            </g>
        }
    </svg>
    <div class="instruction-panel">
        <app-draw-toolbar
            [headerTitle]="'PROCESS_NET.DRAWING_AREA_HEADER'"
            [helpTooltip]="'PROCESS_NET.HELP_TOOLTIP'"
            [actions]="toolbarActions()"
            [instructions]="toolbarInstructions()" />
    </div>
</div>
